<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Energy</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-top: 50px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 60%; font-size: 16px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #00bcd4; color: white; font-size: 16px; margin-top: 10px; cursor: pointer;}
        
        /* Fake Call Screen (Default Hidden) */
        #call-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #092c34; z-index: 1000; text-align: center; color: white; padding-top: 80px;
        }
        .caller-name { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .calling-status { font-size: 18px; color: #a5d6a7; margin-bottom: 100px; }
        .action-btns { display: flex; justify-content: space-around; padding: 0 50px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .accept { background: #4caf50; }
        .decline { background: #f44336; }
    </style>
</head>
<body>

    <div id="setup-screen" class="box">
        <h2>Enter Connection Code</h2>
        <p>Apne host se code lekar yahan dalein:</p>
        <input type="text" id="hostIdInput" placeholder="Eg: 1234"><br>
        <button onclick="connectToHost()">Connect</button>
        <p id="status" style="color: #888;"></p>
    </div>

    <div id="call-screen">
        <div class="caller-name">Unknown Person</div>
        <div class="calling-status">Incoming Call...</div>
        
        <div class="action-btns">
            <div class="btn decline">Cut</div>
            <div class="btn accept">Answer</div>
        </div>
        <audio id="ringtone" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" loop></audio>
    </div>

    <script>
        var peer = new Peer(); 
        var conn;

        function connectToHost() {
            var hostId = document.getElementById("hostIdInput").value;
            document.getElementById("status").innerText = "Connecting...";
            
            // Host se connect ho raha hai
            conn = peer.connect(hostId);
            
            conn.on('open', function() {
                document.getElementById("status").innerText = "Connected! Please keep your phone on the table.";
                document.getElementById("status").style.color = "#4caf50";
            });

            // Jab app se data aaye
            conn.on('data', function(data) {
                if (data === "TRIGGER_CALL") {
                    document.getElementById("setup-screen").style.display = "none";
                    document.getElementById("call-screen").style.display = "block";
                    document.getElementById("ringtone").play();
                }
            });
        }
    </script>
</body>
</html>
