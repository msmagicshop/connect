<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Energy</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: white; 
            margin: 0; 
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        /* Setup Screen Style */
        .box { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 15px; 
            width: 80%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        h2 { color: #00bcd4; margin-bottom: 10px; }
        input { 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #2b2b2b;
            color: white;
            width: 80%; 
            font-size: 18px; 
            text-align: center;
            margin-bottom: 15px;
        }
        button { 
            padding: 12px 30px; 
            border-radius: 8px; 
            border: none; 
            background: #00bcd4; 
            color: black; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer;
            width: 87%;
        }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; }
        
        /* Fake Call Screen (Default Hidden) */
        #call-screen {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364); 
            z-index: 1000; 
            text-align: center; 
            color: white; 
            padding-top: 80px;
        }
        .caller-name { font-size: 36px; font-weight: bold; margin-bottom: 5px; }
        .calling-status { font-size: 16px; color: #a5d6a7; margin-bottom: 150px; }
        
        /* Call Buttons */
        .action-btns { 
            display: flex; 
            justify-content: space-around; 
            padding: 0 60px; 
        }
        .btn { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            color: white;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .accept { background: #4caf50; }
        .decline { background: #f44336; }
    </style>
</head>
<body>

    <div id="setup-screen" class="box">
        <h2>Mind Manifest</h2>
        <p style="color: #bbb;">Apne host ka connection code yahan enter kijiye:</p>
        <input type="text" id="hostIdInput" placeholder="Eg: 5842" maxlength="4"><br>
        <button onclick="connectToHost()">Connect Energy</button>
        <p id="status">Waiting for connection...</p>
    </div>

    <div id="call-screen">
        <div class="caller-name">Unknown Person</div>
        <div class="calling-status">Incoming Call...</div>
        
        <div class="action-btns">
            <div class="btn decline">Decline</div>
            <div class="btn accept">Answer</div>
        </div>
        
        <audio id="ringtone" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" loop></audio>
    </div>

    <script>
        var peer = new Peer(); 
        var conn;

        function connectToHost() {
            var hostId = document.getElementById("hostIdInput").value;
            var statusText = document.getElementById("status");
            
            if(!hostId) {
                alert("Pehle code enter kijiye!");
                return;
            }
            
            statusText.innerText = "Connecting to " + hostId + "...";
            statusText.style.color = "#ffeb3b";
            
            // Connecting to Host
            conn = peer.connect(hostId);
            
            conn.on('open', function() {
                statusText.innerText = "Connected! Please keep your phone screen up and place it on the table.";
                statusText.style.color = "#4caf50";
                
                // Chrome audio policy bypass trick
                // Jab tak user interact nahi karega tab tak sound play nahi hota
                var ringtone = document.getElementById("ringtone");
                ringtone.play().then(() => {
                    ringtone.pause(); // Silent play for permission
                }).catch(error => {
                    console.log("Auto-play was prevented. Interactive permission granted.");
                });
            });

            // Listening for command from the App
            conn.on('data', function(data) {
                if (data === "TRIGGER_CALL") {
                    document.getElementById("setup-screen").style.display = "none";
                    document.getElementById("call-screen").style.display = "block";
                    document.getElementById("ringtone").play();
                    
                    // Thoda vibration effect browser me trigger karne ke liye
                    if (navigator.vibrate) {
                        navigator.vibrate([1000, 500, 1000, 500]); 
                    }
                }
            });
            
            conn.on('error', function(err) {
                statusText.innerText = "Connection failed. Please check code.";
                statusText.style.color = "#f44336";
            });
        }
    </script>
</body>
</html>
