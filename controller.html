<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Controller</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #222; color: white; padding: 20px; }
        .box { background: #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .code { font-size: 32px; font-weight: bold; color: #ffeb3b; letter-spacing: 5px; }
        button { padding: 15px 30px; border-radius: 5px; border: none; background: #e91e63; color: white; font-size: 18px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Aapka Connection Code:</h3>
        <div class="code" id="my-id">Loading...</div>
    </div>

    <div class="box">
        <h3>Controls:</h3>
        <button onclick="triggerCall()">📲 TRIGGER FAKE CALL</button>
        <p id="send-status" style="margin-top: 10px; color: #aaa;"></p>
    </div>

    <script>
        // Custom short ID banana (Jaise mentalism apps me hota hai)
        var customId = Math.floor(1000 + Math.random() * 9000).toString(); 
        
        var peer = new Peer(customId);
        var activeConnection;

        peer.on('open', function(id) {
            document.getElementById('my-id').innerText = id;
        });

        // Jab audience connect kare
        peer.on('connection', function(conn) {
            activeConnection = conn;
            document.getElementById('send-status').innerText = "Audience Connected! Ready to perform.";
            document.getElementById('send-status').style.color = "#4caf50";
        });

        // Button dabane par command bhejna
        function triggerCall() {
            if (activeConnection) {
                activeConnection.send("TRIGGER_CALL");
                document.getElementById('send-status').innerText = "Call Triggered Successfully!";
            } else {
                alert("Pehle audience ko connect hone dijiye!");
            }
        }
    </script>
</body>
</html>
